<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Osaka Rail & Road Layer Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  font-family: sans-serif;
  background: #0d0f14;
  color: #e8ecf4;
}

/* --- ヘッダー --- */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: #0d0f14;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  padding: 0 16px;
  z-index: 1000;
  gap: 12px;
}
#header h1 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
#header p {
  font-size: 10px;
  color: #4a5168;
}
#mobile-btn {
  display: none;
  margin-left: auto;
  background: #1a1e28;
  border: 1px solid rgba(255,255,255,0.15);
  color: #e8ecf4;
  padding: 5px 12px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
}

/* --- サイドバー --- */
#sidebar {
  position: fixed;
  top: 48px;
  left: 0;
  width: 250px;
  bottom: 0;
  background: #13161e;
  border-right: 1px solid rgba(255,255,255,0.07);
  overflow-y: auto;
  z-index: 900;
}

/* --- 地図エリア --- */
#map {
  position: fixed;
  top: 48px;
  left: 250px;
  right: 0;
  bottom: 0;
}

/* --- パネル中身 --- */
.section {
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 8px 0 4px;
}
.section-head {
  padding: 4px 12px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-head label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  user-select: none;
}
.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 16px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  flex-shrink: 0;
}
.row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 12px 4px 28px;
  font-size: 11px;
  color: #7a8399;
  cursor: pointer;
  user-select: none;
}
.row:hover { background: rgba(255,255,255,0.04); color: #e8ecf4; }
.row label { display: flex; align-items: center; gap: 7px; cursor: pointer; width: 100%; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.rdot { width: 14px; height: 3px; background: #666; flex-shrink: 0; }
.dir-label {
  font-size: 10px;
  color: #4a5168;
  padding: 5px 12px 2px 28px;
}
.panel-foot {
  padding: 12px;
  font-size: 9px;
  color: #4a5168;
  line-height: 1.8;
}

/* --- 地図コントロール --- */
#map-ctrl {
  position: fixed;
  top: 60px;
  right: 12px;
  z-index: 800;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cbtn {
  width: 34px; height: 34px;
  background: #13161e;
  border: 1px solid rgba(255,255,255,0.2);
  color: #e8ecf4;
  font-size: 18px;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cbtn:hover { border-color: #ff6b35; color: #ff6b35; }

/* --- Leaflet override --- */
.leaflet-control-zoom { display: none !important; }
.leaflet-control-attribution {
  background: rgba(13,15,20,0.8) !important;
  color: #4a5168 !important;
  font-size: 9px !important;
}
.leaflet-popup-content-wrapper {
  background: #13161e !important;
  border: 1px solid rgba(255,255,255,0.2) !important;
  border-radius: 8px !important;
  padding: 0 !important;
  color: #e8ecf4 !important;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6) !important;
}
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip { background: #13161e !important; }
.leaflet-popup-close-button { color: #7a8399 !important; padding: 6px 8px !important; }
.pu { padding: 12px 14px; min-width: 130px; }
.pu-name { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
.pu-line { font-size: 11px; color: #7a8399; display: flex; align-items: center; gap: 5px; }
.pu-dot { width: 8px; height: 8px; border-radius: 50%; }
.pu-op { font-size: 10px; color: #4a5168; margin-top: 3px; }
.leaflet-tooltip {
  background: #13161e !important;
  border: 1px solid rgba(255,255,255,0.2) !important;
  color: #e8ecf4 !important;
  font-size: 11px !important;
  border-radius: 4px !important;
  padding: 3px 7px !important;
  white-space: nowrap !important;
}
.leaflet-tooltip::before { border-top-color: rgba(255,255,255,0.2) !important; }

/* --- モバイル --- */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 890;
}
@media (max-width: 700px) {
  #mobile-btn { display: block; }
  #sidebar {
    transform: translateY(100%);
    top: auto;
    width: 100%;
    max-height: 60vh;
    border-radius: 14px 14px 0 0;
    border-right: none;
    border-top: 1px solid rgba(255,255,255,0.15);
    transition: transform 0.3s ease;
    z-index: 895;
  }
  #sidebar.open { transform: translateY(0); }
  #map { left: 0; }
}

  /* エリアジャンプパネル */
  #area-panel {
    position: fixed;
    bottom: 28px;
    left: 258px;
    right: 48px;
    z-index: 700;
    background: rgba(13,15,20,0.88);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 10px 6px;
    backdrop-filter: blur(6px);
  }
  #area-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  #area-panel-title {
    font-size: 9px;
    color: #4a5168;
    letter-spacing: 0.1em;
    font-family: monospace;
  }
  #mode-switch {
    display: flex;
    gap: 3px;
  }
  .mode-btn {
    font-size: 10px;
    font-weight: 700;
    font-family: monospace;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: #7a8399;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .mode-btn.active {
    background: #ff6b35;
    border-color: #ff6b35;
    color: #fff;
  }
  .mode-btn:hover:not(.active) {
    border-color: #ff6b35;
    color: #ff6b35;
  }
  #area-buttons {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .area-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #1a1e28;
    border: 1px solid rgba(255,255,255,0.12);
    color: #e8ecf4;
    border-radius: 6px;
    padding: 5px 10px 4px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 1.2;
    transition: all 0.15s;
    flex: 1;
    min-width: 72px;
  }
  .area-btn span {
    font-size: 9px;
    font-weight: 400;
    color: #7a8399;
    margin-top: 1px;
    white-space: nowrap;
  }
  .area-btn:hover {
    background: #252a38;
    border-color: #ff6b35;
    color: #ff6b35;
  }
  .area-btn:hover span { color: #ff6b35; opacity: 0.7; }
  .area-btn.active {
    background: rgba(255,107,53,0.15);
    border-color: #ff6b35;
    color: #ff6b35;
  }
  /* ランドマークアイコン */
  .lm-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
    transition: transform 0.15s;
  }
  .lm-icon:hover { transform: scale(1.15); }
  .lm-emoji {
    font-size: 28px;
    line-height: 1;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
  }
  .lm-name {
    font-size: 10px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    color: #fff;
    text-shadow: 0 0 6px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.8);
    margin-top: 2px;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }
  /* ランドマークポップアップ */
  .lm-popup { padding: 13px 15px 10px; min-width: 180px; }
  .lm-popup-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .lm-popup-emoji { font-size: 22px; line-height: 1; }
  .lm-popup-title { font-size: 14px; font-weight: 700; color: #e8ecf4; }
  .lm-popup-badge {
    display: inline-block;
    font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 3px;
    margin-bottom: 6px;
    color: #fff;
  }
  .lm-popup-desc { font-size: 11px; color: #7a8399; line-height: 1.7; margin-bottom: 7px; }
  .lm-popup-spots-title { font-size: 9px; color: #4a5168; letter-spacing: 0.1em; margin-bottom: 4px; }
  .lm-popup-spots {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .lm-popup-spot {
    font-size: 10px; color: #e8ecf4;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 3px; padding: 2px 7px;
  }

  /* エリアラベル（地図上） */
  .area-label {
    font-size: 11px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.05em;
    text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.7);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0.9;
  }
  @media (max-width: 700px) {
    #area-panel {
      left: 8px; right: 8px; bottom: 8px;
      padding: 6px 8px 5px;
    }
    #area-panel-header { margin-bottom: 4px; }
    #area-buttons { gap: 3px; }
    .area-btn { font-size: 10px; padding: 4px 5px 3px; min-width: 0; flex: 1; }
    .area-btn span { display: none; }
    #map { bottom: 80px; }
  }
</style>
</head>
<body>

<div id="header">
  <span style="color:#ff6b35;font-size:18px">◈</span>
  <div>
    <h1>Osaka Rail &amp; Road Layer Map</h1>
    <p>路線・道路レイヤーマップ</p>
  </div>
  <button id="mobile-btn" onclick="togglePanel()">⊞ レイヤー</button>
</div>

<div id="overlay" onclick="closePanel()"></div>

<div id="sidebar">
  <!-- Osaka Metro -->
  <div class="section">
    <div class="section-head">
      <label><input type="checkbox" id="g-metro" checked onchange="toggleGroup('metro',this.checked)">
        <span class="badge" style="background:#E5171F;color:#fff">M</span> Osaka Metro</label>
    </div>
    <div class="row"><label><input type="checkbox" data-layer="midosuji"                  data-group="metro" checked><span class="dot" style="background:#E5171F"></span>御堂筋線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="tanimachi"                 data-group="metro" checked><span class="dot" style="background:#522886"></span>谷町線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="yotsubashi"                data-group="metro"><span class="dot" style="background:#0078BA"></span>四つ橋線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="chuo"                      data-group="metro" checked><span class="dot" style="background:#019A66"></span>中央線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="sennichimae"               data-group="metro"><span class="dot" style="background:#E44D93"></span>千日前線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="sakaisuji"                 data-group="metro"><span class="dot" style="background:#814721"></span>堺筋線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="nagahori_tsurumi_ryokuchi" data-group="metro"><span class="dot" style="background:#A9CC51"></span>長堀鶴見緑地線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="imazatosuji"               data-group="metro"><span class="dot" style="background:#EE7B1A"></span>今里筋線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="nanko_port_town"           data-group="metro"><span class="dot" style="background:#00A0DE"></span>ニュートラム</label></div>
  </div>

  <!-- JR -->
  <div class="section">
    <div class="section-head">
      <label><input type="checkbox" id="g-jr" checked onchange="toggleGroup('jr',this.checked)">
        <span class="badge" style="background:#E80000;color:#fff">JR</span> JR西日本</label>
    </div>
    <div class="row"><label><input type="checkbox" data-layer="jr_osaka_loop"    data-group="jr" checked><span class="dot" style="background:#E80000"></span>大阪環状線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="jr_yumesaki"      data-group="jr"><span class="dot" style="background:#0072BC"></span>JRゆめ咲線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="jr_tozai"         data-group="jr"><span class="dot" style="background:#FF69B4"></span>JR東西線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="jr_kyoto_kobe"    data-group="jr"><span class="dot" style="background:#0072BC"></span>JR京都・神戸線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="jr_yamatoji"      data-group="jr"><span class="dot" style="background:#00A651"></span>大和路線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="jr_hanwa"         data-group="jr"><span class="dot" style="background:#F15A24"></span>阪和線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="jr_osaka_higashi" data-group="jr"><span class="dot" style="background:#0A8F08"></span>おおさか東線</label></div>
  </div>

  <!-- 阪神 -->
  <div class="section">
    <div class="section-head">
      <label><input type="checkbox" id="g-hanshin" onchange="toggleGroup('hanshin',this.checked)">
        <span class="badge" style="background:#1E50A2;color:#fff">HS</span> 阪神電気鉄道</label>
    </div>
    <div class="row"><label><input type="checkbox" data-layer="hanshin_main"  data-group="hanshin"><span class="dot" style="background:#1E50A2"></span>阪神本線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="hanshin_namba" data-group="hanshin"><span class="dot" style="background:#F39800"></span>阪神なんば線</label></div>
  </div>

  <!-- 阪急 -->
  <div class="section">
    <div class="section-head">
      <label><input type="checkbox" id="g-hankyu" onchange="toggleGroup('hankyu',this.checked)">
        <span class="badge" style="background:#6B2C1A;color:#fff">HK</span> 阪急電鉄</label>
    </div>
    <div class="row"><label><input type="checkbox" data-layer="hankyu_kobe"       data-group="hankyu"><span class="dot" style="background:#6B2C1A"></span>阪急神戸線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="hankyu_takarazuka" data-group="hankyu"><span class="dot" style="background:#F2A900"></span>阪急宝塚線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="hankyu_kyoto"      data-group="hankyu"><span class="dot" style="background:#2E8B57"></span>阪急京都線</label></div>
    <div class="row"><label><input type="checkbox" data-layer="hankyu_senri"      data-group="hankyu"><span class="dot" style="background:#6B2C1A"></span>阪急千里線</label></div>
  </div>

  <!-- 道路 -->
  <div class="section">
    <div class="section-head">
      <label><input type="checkbox" id="g-roads" checked onchange="toggleGroup('roads',this.checked)">
        <span class="badge" style="background:#555;color:#fff">道</span> 主要道路</label>
    </div>
    <div class="dir-label">─ 南北 ─</div>
    <div class="row"><label><input type="checkbox" data-layer="shin_naniwa"     data-group="roads"><span class="rdot"></span>新なにわ筋</label></div>
    <div class="row"><label><input type="checkbox" data-layer="naniwasuji"      data-group="roads"><span class="rdot"></span>なにわ筋</label></div>
    <div class="row"><label><input type="checkbox" data-layer="amidaike"        data-group="roads"><span class="rdot"></span>あみだ池筋</label></div>
    <div class="row"><label><input type="checkbox" data-layer="yotsubashisuji"  data-group="roads"><span class="rdot"></span>四ツ橋筋</label></div>
    <div class="row"><label><input type="checkbox" data-layer="midosuji_road"   data-group="roads" checked><span class="rdot"></span>御堂筋</label></div>
    <div class="row"><label><input type="checkbox" data-layer="sakaisuji_road"  data-group="roads"><span class="rdot"></span>堺筋</label></div>
    <div class="row"><label><input type="checkbox" data-layer="matsuyamachisuji" data-group="roads"><span class="rdot"></span>松屋町筋</label></div>
    <div class="row"><label><input type="checkbox" data-layer="tanimachisuji"   data-group="roads"><span class="rdot"></span>谷町筋</label></div>
    <div class="row"><label><input type="checkbox" data-layer="uemachidori"     data-group="roads"><span class="rdot"></span>上町筋</label></div>
    <div class="dir-label">─ 東西 ─</div>
    <div class="row"><label><input type="checkbox" data-layer="route1_2"        data-group="roads"><span class="rdot"></span>国道1号・2号</label></div>
    <div class="row"><label><input type="checkbox" data-layer="tosabori"        data-group="roads"><span class="rdot"></span>土佐堀通</label></div>
    <div class="row"><label><input type="checkbox" data-layer="sonezakidori"    data-group="roads"><span class="rdot"></span>曽根崎通</label></div>
    <div class="row"><label><input type="checkbox" data-layer="honmachidori"    data-group="roads"><span class="rdot"></span>本町通</label></div>
    <div class="row"><label><input type="checkbox" data-layer="chuo_odori"      data-group="roads" checked><span class="rdot"></span>中央大通</label></div>
    <div class="row"><label><input type="checkbox" data-layer="nagahoridori"    data-group="roads"><span class="rdot"></span>長堀通</label></div>
    <div class="row"><label><input type="checkbox" data-layer="sennichimaedori" data-group="roads"><span class="rdot"></span>千日前通</label></div>
    <div class="row"><label><input type="checkbox" data-layer="route25"         data-group="roads"><span class="rdot"></span>国道25号</label></div>
  </div>

  <!-- ランドマーク -->
  <div class="section">
    <div class="section-head">
      <label><input type="checkbox" id="g-landmarks" checked onchange="toggleLandmarks(this.checked)">
        <span class="badge" style="background:#ff6b35;color:#fff">★</span> エリアランドマーク</label>
    </div>
  </div>

  <div class="panel-foot">
    <div style="color:#ff6b35;font-weight:700;font-size:10px;margin-bottom:4px">Osaka Rail &amp; Road Layer Map</div>
    <div>&copy; 2025 osaka-rail-road-map Project</div>
    <div>地図データ：&copy; OpenStreetMap contributors / CARTO</div>
    <div>鉄道・道路データ：開発用近似データ</div>
  </div>
</div>

<div id="map"></div>


  <!-- エリアジャンプパネル -->
  <div id="area-panel">
    <div id="area-panel-header">
      <span id="area-panel-title">エリアへ移動</span>
      <div id="mode-switch">
        <button class="mode-btn active" id="mode-btn-8"  onclick="setAreaMode(8)">8区分</button>
        <button class="mode-btn"        id="mode-btn-10" onclick="setAreaMode(10)">10区分</button>
      </div>
    </div>
    <div id="area-buttons"></div>
  </div>

  <div id="map-ctrl">
  <button class="cbtn" onclick="map.zoomIn()">＋</button>
  <button class="cbtn" onclick="map.zoomOut()">－</button>
  <button class="cbtn" onclick="map.setView([34.6937,135.5023],12)" title="リセット">⌖</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ── レイヤー管理 ─────────────────────────────────────
const RL = {}; // routeLayers
const DL = {}; // roadLayers

function addRailData(geojson) {
  const lines  = geojson.features.filter(f => f.geometry.type === 'LineString');
  const points = geojson.features.filter(f => f.geometry.type === 'Point');

  lines.forEach(lf => {
    const p  = lf.properties;
    const id = p.id;
    if (!id) return;

    const ll = L.geoJSON(lf, {
      style: { color: p.color || '#aaa', weight: 5, opacity: 1.0, lineCap: 'round', lineJoin: 'round' }
    }).on('click', e => showLinePopup(e.latlng, p));

    const stPts = points.filter(pt => pt.properties.route_id === id);
    let sl = null;
    if (stPts.length) {
      sl = L.geoJSON({ type: 'FeatureCollection', features: stPts }, {
        pointToLayer: (f, latlng) => L.circleMarker(latlng, {
          radius: 5, fillColor: p.color || '#aaa', fillOpacity: 1.0,
          color: '#fff', weight: 2.0
        }),
        onEachFeature: (f, layer) => {
          const sp = f.properties;
          layer.bindTooltip(sp.station_name || '', { direction: 'top', offset: [0, -6] });
          layer.on('click', () => showStationPopup(layer.getLatLng(), sp, p));
        }
      });
    }
    RL[id] = { line: ll, stations: sl };
  });
}

function addRoadData(geojson) {
  const dirLabel = { north_south: '南北', east_west: '東西' };
  geojson.features.filter(f => f.geometry.type === 'LineString').forEach(lf => {
    const p  = lf.properties;
    const id = p.id;
    if (!id) return;
    const rl = L.geoJSON(lf, {
      style: { color: '#c0a060', weight: 2.5, opacity: 0.55, dashArray: '8,5', lineCap: 'round' }
    }).on('click', e => {
      L.popup().setLatLng(e.latlng).setContent(
        `<div class="pu"><div class="pu-name">🛣 ${p.name || id}</div>` +
        `<div class="pu-line">方向：${dirLabel[p.direction] || p.direction || ''}</div></div>`
      ).openOn(map);
    });
    DL[id] = rl;
  });
}

function showLinePopup(latlng, p) {
  L.popup().setLatLng(latlng).setContent(
    `<div class="pu">
      <div class="pu-line"><span class="pu-dot" style="background:${p.color||'#aaa'}"></span>
      <span class="pu-name">${p.name || p.id}</span></div>
      <div class="pu-op">${p.operator || ''}</div>
    </div>`
  ).openOn(map);
}

function showStationPopup(latlng, sp, rp) {
  L.popup().setLatLng(latlng).setContent(
    `<div class="pu">
      <div class="pu-name">🚉 ${sp.station_name || ''}</div>
      <div class="pu-line"><span class="pu-dot" style="background:${rp.color||'#aaa'}"></span>${sp.route_name || rp.name || ''}</div>
      <div class="pu-op">${sp.operator || rp.operator || ''}</div>
    </div>`
  ).openOn(map);
}

// ── 表示切替 ─────────────────────────────────────────
function setVisible(id, on) {
  const r = RL[id];
  const d = DL[id];
  if (r) {
    on ? map.addLayer(r.line) : map.removeLayer(r.line);
    if (r.stations) { on ? map.addLayer(r.stations) : map.removeLayer(r.stations); }
  }
  if (d) { on ? map.addLayer(d) : map.removeLayer(d); }
}

function toggleGroup(grp, on) {
  document.querySelectorAll(`[data-group="${grp}"]`).forEach(cb => {
    cb.checked = on;
    setVisible(cb.dataset.layer, on);
  });
}

// ── データ読み込み＆初期表示 ─────────────────────────
addRailData(GEO_METRO);
addRailData(GEO_JR);
addRoadData(GEO_ROADS);

document.querySelectorAll('[data-layer]').forEach(cb => {
  setVisible(cb.dataset.layer, cb.checked);
  cb.addEventListener('change', () => {
    setVisible(cb.dataset.layer, cb.checked);
    // グループチェックボックス同期
    const grpMap = { metro:'g-metro', jr:'g-jr', hanshin:'g-hanshin', hankyu:'g-hankyu', roads:'g-roads' };
    const gcb = document.getElementById(grpMap[cb.dataset.group]);
    if (gcb) {
      const all = [...document.querySelectorAll(`[data-group="${cb.dataset.group}"]`)];
      gcb.checked       = all.every(c => c.checked);
      gcb.indeterminate = !gcb.checked && all.some(c => c.checked);
    }
  });
});

// ── モバイル ─────────────────────────────────────────
function togglePanel() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('overlay');
  s.classList.toggle('open');
  o.style.display = s.classList.contains('open') ? 'block' : 'none';
}
function closePanel() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').style.display = 'none';
}

// ══════════════════════════════════════════════════
// モード管理
// ══════════════════════════════════════════════════
let currentMode = 8;
let activeArea  = null;

const areaPolygons  = {};
const areaMapLabels = {};
const landmarkMkrs  = {};

const AREA_SHOW_ZOOM = 13;

// ── ポリゴン＆ラベル構築 ────────────────────────────
function buildAreaLayers(areasObj, prefix) {
  Object.entries(areasObj).forEach(([key, a]) => {
    const id = prefix + key;

    const poly = L.polygon(a.polygon, {
      color: a.color, weight: 2, opacity: 0.85,
      fillColor: a.color, fillOpacity: 0.07,
      dashArray: '6,4', interactive: false, pane: 'shadowPane'
    });

    const centroid = a.polygon.reduce(
      (acc, p) => [acc[0] + p[0]/a.polygon.length, acc[1] + p[1]/a.polygon.length], [0,0]
    );
    const lbl = L.marker(centroid, {
      icon: L.divIcon({
        className: '',
        html: `<div class="area-label" style="color:${a.color}">${a.label}</div>`,
        iconAnchor: [30, 10]
      }),
      interactive: false
    });

    areaPolygons[id]  = poly;
    areaMapLabels[id] = lbl;
  });
}

// ── ランドマーク構築 ─────────────────────────────────
function buildLandmarkSet(landmarksObj, prefix) {
  Object.entries(landmarksObj).forEach(([key, lm]) => {
    const id = prefix + key;
    const icon = L.divIcon({
      className: '',
      html: `<div class="lm-icon"><div class="lm-emoji">${lm.emoji}</div><div class="lm-name">${lm.name}</div></div>`,
      iconAnchor: [20, 16], iconSize: [40, 46]
    });
    const marker = L.marker(lm.pos, { icon, zIndexOffset: 200 });
    const spotsHtml = lm.spots.map(s => `<span class="lm-popup-spot">${s}</span>`).join('');
    marker.bindPopup(`
      <div class="lm-popup">
        <div class="lm-popup-header">
          <span class="lm-popup-emoji">${lm.emoji}</span>
          <span class="lm-popup-title">${lm.name}</span>
        </div>
        <div class="lm-popup-badge" style="background:${lm.color}">${lm.name}エリア</div>
        <div class="lm-popup-desc">${lm.desc}</div>
        <div class="lm-popup-spots-title">── 代表スポット ──</div>
        <div class="lm-popup-spots">${spotsHtml}</div>
      </div>`, { maxWidth: 240 });
    landmarkMkrs[id] = marker;
  });
}

// ── エリアジャンプボタン描画 ─────────────────────────
function renderAreaButtons(areasObj) {
  const container = document.getElementById('area-buttons');
  container.innerHTML = '';
  Object.entries(areasObj).forEach(([key, a]) => {
    const btn = document.createElement('button');
    btn.className = 'area-btn';
    btn.style.borderColor = 'rgba(255,255,255,0.12)';
    btn.innerHTML = `${a.label}<span>${a.center ? '' : ''}</span>`;
    btn.onclick = () => jumpTo(key);
    container.appendChild(btn);
  });
}

// ── 表示更新 ─────────────────────────────────────────
function updateAreaVisibility() {
  const z    = map.getZoom();
  const show = z >= AREA_SHOW_ZOOM;
  const prefix = currentMode === 8 ? 'a8_' : 'a10_';

  // 全ポリゴン・ラベルを一旦クリア
  Object.values(areaPolygons).forEach(p  => { if (map.hasLayer(p)) map.removeLayer(p); });
  Object.values(areaMapLabels).forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });

  // 現モードのもののみ表示
  if (show) {
    Object.keys(currentMode === 8 ? AREAS_8 : AREAS_10).forEach(key => {
      const id = prefix + key;
      if (areaPolygons[id])  map.addLayer(areaPolygons[id]);
      if (areaMapLabels[id]) map.addLayer(areaMapLabels[id]);
    });
  }
}

function updateLandmarkVisibility() {
  const on8  = currentMode === 8;
  const on10 = currentMode === 10;
  const lmOn = document.getElementById('g-landmarks')?.checked ?? true;

  Object.keys(LANDMARKS_8).forEach(key => {
    const m = landmarkMkrs['l8_' + key];
    if (!m) return;
    (lmOn && on8) ? map.addLayer(m) : map.removeLayer(m);
  });
  Object.keys(LANDMARKS_10).forEach(key => {
    const m = landmarkMkrs['l10_' + key];
    if (!m) return;
    (lmOn && on10) ? map.addLayer(m) : map.removeLayer(m);
  });
}

// ── モード切替 ───────────────────────────────────────
function setAreaMode(mode) {
  currentMode = mode;
  document.getElementById('mode-btn-8').classList.toggle('active',  mode === 8);
  document.getElementById('mode-btn-10').classList.toggle('active', mode === 10);
  renderAreaButtons(mode === 8 ? AREAS_8 : AREAS_10);
  updateAreaVisibility();
  updateLandmarkVisibility();
  // 中心に戻す
  map.flyTo([34.6937, 135.5023], mode === 8 ? 12 : 13, { duration: 0.8 });
}

// ── エリアジャンプ ─────────────────────────────────
function jumpTo(key) {
  const areas = currentMode === 8 ? AREAS_8 : AREAS_10;
  const a = areas[key];
  if (!a) return;
  map.flyTo(a.center, a.zoom, { duration: 0.8, easeLinearity: 0.4 });
  document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
  const keys = Object.keys(areas);
  document.querySelectorAll('.area-btn')[keys.indexOf(key)]?.classList.add('active');
  activeArea = key;
}

// ── ランドマーク ON/OFF ──────────────────────────────
function toggleLandmarks(on) {
  updateLandmarkVisibility();
}

// ── 初期化 ───────────────────────────────────────────
buildAreaLayers(AREAS_8,    'a8_');
buildAreaLayers(AREAS_10,   'a10_');
buildLandmarkSet(LANDMARKS_8,  'l8_');
buildLandmarkSet(LANDMARKS_10, 'l10_');

map.on('zoomend', updateAreaVisibility);

renderAreaButtons(AREAS_8);   // 初期は8区分
setAreaMode(8);


</script>
